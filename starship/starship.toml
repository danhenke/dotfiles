# Refer https://starship.rs/config/
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 100
command_timeout = 500
add_newline = false

[hostname]
ssh_only = false
style = 'green'
format = '[$ssh_symbol$hostname]($style)(white):'

[cmd_duration]
disabled = true

[directory]
truncation_length = 5
truncation_symbol = '…/'
style = 'bold yellow'

[line_break]
disabled = true

[username]
style_user = 'cyan'
style_root = 'black bold'
format = '[$user]($style)@'
disabled = false
show_always = true
